<!-- Welcome {{name}}.Welcome to our awesome app. -->
<H1>Welcome ! </H1>
<div class="container">
    Welcome {{name}}. you can manage your todos 
    <a routerLink="/todos">here</a>
</div>
<div class="container">
    Click here to get a customized welcome message.
    <button class="btn btn-success" (click)="getWelcomeMessageWithPathVariable()">Get Welcome Message</button>
</div>

<div class="container" *ngIf="welcomeMessageFromService">
    <H2>Your Customized Welcome Message</H2>
    {{welcomeMessageFromService}}
</div>
